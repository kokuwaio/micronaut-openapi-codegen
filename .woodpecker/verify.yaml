when:
  event: [manual, pull_request]
  path: [.woodpecker/verify.yaml, .woodpecker/maven/settings.xml, pom.xml, src/**]

steps:

  maven:
    image: maven:3.9.16-eclipse-temurin-25
    commands: mvn verify --settings=.woodpecker/maven/settings.xml

  git:
    image: maven:3.9.16-eclipse-temurin-25
    commands: .woodpecker/maven/git-check.sh
